name: Build AppImage (ARM64 / Raspberry Pi)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:

  build-arm64:
    name: Build AppImage (ARM64 / Raspberry Pi)
    runs-on: ubuntu-22.04

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: QEMU kur (ARM emülasyonu)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: ARM64 container içinde derle
        uses: docker/setup-buildx-action@v3

      - name: ARM64 ortamda build (sadece PyInstaller)
        run: |
          docker run --rm --platform linux/arm64 \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            arm64v8/ubuntu:22.04 \
            bash -c "
              set -e
              export DEBIAN_FRONTEND=noninteractive
              export TZ=Europe/Istanbul

              apt-get update -y
              apt-get install -y tzdata
              apt-get install -y \
                python3.11 python3.11-venv python3-pip \
                libpython3.11-dev \
                libfuse2 libglib2.0-0 libgl1 \
                libxcb-xinerama0 libxkbcommon-x11-0 \
                libdbus-1-3 python3-tk python3-pyqt5 \
                patchelf file binutils

              python3.11 -m pip install --upgrade pip
              pip install pyinstaller psutil smbus2

              python3.11 -m PyInstaller \
                --onedir \
                --name CTBattery \
                --windowed \
                --hidden-import psutil \
                --hidden-import smbus2 \
                ctbatterry.py
            "

      - name: AppDir yapısını oluştur (x86 runner üzerinde)
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          cp -r dist/CTBattery/* AppDir/usr/bin/

          cat > AppDir/usr/share/applications/ctbattery.desktop << 'EOF'
          [Desktop Entry]
          Name=CTBattery
          Exec=CTBattery
          Icon=ctbattery
          Type=Application
          Categories=Utility;
          EOF

          cp AppDir/usr/share/applications/ctbattery.desktop AppDir/ctbattery.desktop

          python3 -c "
          import struct, zlib
          def make_png(w,h):
              def chunk(t,d): c=zlib.crc32(t+d)&0xffffffff; return struct.pack(\'>I\',len(d))+t+d+struct.pack(\'>I\',c)
              raw=b\'\'.join(b\'\x00\'+b\'\x88\x88\x88\xff\'*w for _ in range(h))
              return b\'\x89PNG\r\n\x1a\n\'+chunk(b\'IHDR\',struct.pack(\'>IIBBBBB\',w,h,8,2,0,0,0))+chunk(b\'IDAT\',zlib.compress(raw))+chunk(b\'IEND\',b\'\')
          open(\'AppDir/ctbattery.png\',\'wb\').write(make_png(256,256))
          open(\'AppDir/usr/share/icons/hicolor/256x256/apps/ctbattery.png\',\'wb\').write(make_png(256,256))
          "

          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          export PATH="${HERE}/usr/bin:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/CTBattery" "$@"
          EOF
          chmod +x AppDir/AppRun

      - name: appimagetool indir (x86_64 cross-compile için)
        run: |
          sudo apt-get install -y libfuse2 wget
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
               -O appimagetool
          chmod +x appimagetool
          ./appimagetool --appimage-extract
          mv squashfs-root appimagetool-extracted

      - name: AppImage oluştur (ARCH=aarch64, tool=x86_64)
        run: |
          ARCH=aarch64 ./appimagetool-extracted/AppRun AppDir CTBattery-aarch64.AppImage

      - name: Artifact olarak yükle (ARM64)
        uses: actions/upload-artifact@v4
        with:
          name: CTBattery-aarch64
          path: CTBattery-aarch64.AppImage
          retention-days: 30
