name: Build AppImage (x86_64 & ARM)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:

  # ─────────────────────────────────────────
  # 1) x86_64 AppImage — standart GitHub runner
  # ─────────────────────────────────────────
  build-x86:
    name: Build AppImage (x86_64)
    runs-on: ubuntu-22.04

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Python 3.11 kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sistem bağımlılıklarını kur (GUI için)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libfuse2 \
            libglib2.0-0 \
            libgl1 \
            libxcb-xinerama0 \
            libxkbcommon-x11-0 \
            libdbus-1-3 \
            python3-tk \
            python3-pyqt5 \
            libpython3.11-dev \
            patchelf \
            file \
            wget

      - name: PyInstaller ve psutil kur
        run: pip install pyinstaller psutil

      - name: PyInstaller ile derle (x86_64)
        run: |
          pyinstaller \
            --onedir \
            --name "CTBattery" \
            --windowed \
            --hidden-import psutil \
            ctbatterry.py

      - name: AppDir yapısını oluştur
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          cp -r dist/CTBattery/* AppDir/usr/bin/

          cat > AppDir/usr/share/applications/ctbattery.desktop << 'EOF'
          [Desktop Entry]
          Name=CTBattery
          Exec=CTBattery
          Icon=ctbattery
          Type=Application
          Categories=Utility;
          EOF

          cp AppDir/usr/share/applications/ctbattery.desktop AppDir/ctbattery.desktop

          if [ -f "icon.png" ]; then
            cp icon.png AppDir/usr/share/icons/hicolor/256x256/apps/ctbattery.png
            cp icon.png AppDir/ctbattery.png
          else
            python3 -c "
          import struct, zlib
          def make_png(w,h):
              def chunk(t,d): c=zlib.crc32(t+d)&0xffffffff; return struct.pack('>I',len(d))+t+d+struct.pack('>I',c)
              raw=b''.join(b'\x00'+b'\x88\x88\x88\xff'*w for _ in range(h))
              return b'\x89PNG\r\n\x1a\n'+chunk(b'IHDR',struct.pack('>IIBBBBB',w,h,8,2,0,0,0))+chunk(b'IDAT',zlib.compress(raw))+chunk(b'IEND',b'')
          open('AppDir/ctbattery.png','wb').write(make_png(256,256))
          open('AppDir/usr/share/icons/hicolor/256x256/apps/ctbattery.png','wb').write(make_png(256,256))
          "
          fi

          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          export PATH="${HERE}/usr/bin:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/CTBattery" "$@"
          EOF
          chmod +x AppDir/AppRun

      - name: appimagetool indir (x86_64)
        run: |
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
               -O appimagetool
          chmod +x appimagetool
          ./appimagetool --appimage-extract
          mv squashfs-root appimagetool-extracted

      - name: AppImage oluştur (x86_64)
        run: |
          ARCH=x86_64 ./appimagetool-extracted/AppRun AppDir CTBattery-x86_64.AppImage

      - name: Artifact olarak yükle (x86_64)
        uses: actions/upload-artifact@v4
        with:
          name: CTBattery-x86_64
          path: CTBattery-x86_64.AppImage
          retention-days: 30

  # ─────────────────────────────────────────
  # 2) ARM64 AppImage — Raspberry Pi (arm64/aarch64)
  # ─────────────────────────────────────────
  build-arm64:
    name: Build AppImage (ARM64 / Raspberry Pi)
    runs-on: ubuntu-22.04

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: QEMU kur (ARM emülasyonu)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: ARM64 container içinde derle
        uses: docker/setup-buildx-action@v3

      - name: ARM64 ortamda build
        run: |
          docker run --rm --platform linux/arm64 \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            arm64v8/ubuntu:22.04 \
            bash -c "
              set -e

              export DEBIAN_FRONTEND=noninteractive
              export TZ=Europe/Istanbul

              apt-get update -y
              apt-get install -y tzdata
              apt-get install -y \
                python3.11 python3.11-venv python3-pip \
                libpython3.11-dev \
                libfuse2 libglib2.0-0 libgl1 \
                libxcb-xinerama0 libxkbcommon-x11-0 \
                libdbus-1-3 python3-tk python3-pyqt5 \
                patchelf file wget binutils

              python3.11 -m pip install --upgrade pip
              pip install pyinstaller psutil

              python3.11 -m PyInstaller \
                --onedir \
                --name 'CTBattery' \
                --windowed \
                --hidden-import psutil \
                ctbatterry.py

              mkdir -p AppDir/usr/bin
              mkdir -p AppDir/usr/share/applications
              mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
              cp -r dist/CTBattery/* AppDir/usr/bin/

              cat > AppDir/usr/share/applications/ctbattery.desktop << 'DEOF'
          [Desktop Entry]
          Name=CTBattery
          Exec=CTBattery
          Icon=ctbattery
          Type=Application
          Categories=Utility;
          DEOF

              cp AppDir/usr/share/applications/ctbattery.desktop AppDir/ctbattery.desktop

              python3 -c \"
          import struct, zlib
          def make_png(w,h):
              def chunk(t,d): c=zlib.crc32(t+d)&0xffffffff; return struct.pack('>I',len(d))+t+d+struct.pack('>I',c)
              raw=b''.join(b'\x00'+b'\x88\x88\x88\xff'*w for _ in range(h))
              return b'\x89PNG\r\n\x1a\n'+chunk(b'IHDR',struct.pack('>IIBBBBB',w,h,8,2,0,0,0))+chunk(b'IDAT',zlib.compress(raw))+chunk(b'IEND',b'')
          open('AppDir/ctbattery.png','wb').write(make_png(256,256))
          open('AppDir/usr/share/icons/hicolor/256x256/apps/ctbattery.png','wb').write(make_png(256,256))
          \"

              cat > AppDir/AppRun << 'AEOF'
          #!/bin/bash
          HERE=\"\$(dirname \"\$(readlink -f \"\${0}\")\")\"
          export PATH=\"\${HERE}/usr/bin:\${PATH}\"
          export LD_LIBRARY_PATH=\"\${HERE}/usr/lib:\${LD_LIBRARY_PATH}\"
          exec \"\${HERE}/usr/bin/CTBattery\" \"\$@\"
          AEOF
              chmod +x AppDir/AppRun

              wget -q 'https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-aarch64.AppImage' \
                   -O appimagetool
              chmod +x appimagetool
              ./appimagetool --appimage-extract
              mv squashfs-root appimagetool-extracted

              ARCH=aarch64 ./appimagetool-extracted/AppRun AppDir CTBattery-aarch64.AppImage
            "

      - name: Artifact olarak yükle (ARM64)
        uses: actions/upload-artifact@v4
        with:
          name: CTBattery-aarch64
          path: CTBattery-aarch64.AppImage
          retention-days: 30

  # ─────────────────────────────────────────
  # 3) Release — Her iki AppImage'ı yayınla
  # ─────────────────────────────────────────
  release:
    name: GitHub Release oluştur
    needs: [ build-x86, build-arm64 ]
    runs-on: ubuntu-22.04
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: x86_64 artifact indir
        uses: actions/download-artifact@v4
        with:
          name: CTBattery-x86_64

      - name: ARM64 artifact indir
        uses: actions/download-artifact@v4
        with:
          name: CTBattery-aarch64

      - name: Release oluştur ve yükle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "CTBattery Build #${{ github.run_number }}"
          body: |
            ## Otomatik Build

            | Platform | Dosya |
            |----------|-------|
            | x86_64 (PC/Linux) | `CTBattery-x86_64.AppImage` |
            | aarch64 (Raspberry Pi 4/5) | `CTBattery-aarch64.AppImage` |

            ### Kullanım
            ```bash
            chmod +x CTBattery-*.AppImage
            ./CTBattery-x86_64.AppImage        # PC'de
            ./CTBattery-aarch64.AppImage       # Raspberry Pi'de
            ```
          files: |
            CTBattery-x86_64.AppImage
            CTBattery-aarch64.AppImage
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
